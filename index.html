<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolo de Bolo – Relatórios</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="detection-badge" class="detection-badge hidden">
        <span class="badge-dot"></span>
        <span id="detection-text">Aguardando relatório...</span>
    </div>

    <div class="top-bar">
        <div class="top-bar-left">
            <img src="Logo Bolo de Bolo 2025 Cor Small.png" alt="Logo Bolo de Bolo">
            <h1>
                <span>Bolo de Bolo</span>
                <span class="title-highlight">Relatórios</span>
            </h1>
        </div>
    </div>

    <div class="container">
        <div class="content-wrapper">
            <div class="side-links">
                <a href="https://gestor.raffinato.inf.br/ProdutosFaturados/Relatorio" target="_blank" class="side-link">Sistema Barra</a>
                <a href="https://gestor.raffinatocore.com/report/order/products-sold?companyId=83c2c9da-2384-43ee-8555-e95644c840f5&storeId=dec4ca8f-7ada-42cd-94c0-c95d88e55c2a" target="_blank" class="side-link">Sistema Millennium</a>
            </div>

            <div class="input-section">
                <h4 class="input-section-title" style="margin:0 0 10px 0;font-size:1.13rem;color:#263238;font-weight:600;">Relatório de vendas</h4>
                <div class="textarea-wrapper">
                    <textarea id="input-main" placeholder="Cole o relatório aqui (Barra ou Millennium)..."></textarea>
                    <button class="clear-button" id="clear-main" style="display: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="button-container">
                    <button class="paste-button" id="pasteButton-main">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                        </svg>
                        Colar
                    </button>
                    <button id="copyButton-loja" class="button button-disabled middle-button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        <span>Copiar Barra</span>
                    </button>
                    <button id="copyButton-quiosque" class="button button-disabled">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        <span>Copiar Millennium</span>
                    </button>
                </div>

                <div id="error" class="alert alert-error"></div>
                <div id="unknown-bolos" class="alert alert-warning"></div>
            </div>

            <div class="bolos-summary" id="bolos-summary">
                <div class="bolos-cell">
                    <div class="bolos-label">Barra</div>
                    <div class="bolos-value" id="bolos-barra">—</div>
                </div>
                <div class="bolos-cell">
                    <div class="bolos-label">Millennium</div>
                    <div class="bolos-value" id="bolos-millennium">—</div>
                </div>
                <div class="bolos-cell bolos-cell-total">
                    <div class="bolos-label">Total</div>
                    <div class="bolos-value" id="bolos-total">—</div>
                </div>
            </div>

            <!-- Áreas de preview para processamento interno -->
            <div style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;">
                <div id="preview-loja" aria-hidden="true"></div>
                <div id="preview-quiosque" aria-hidden="true"></div>
            </div>
        </div>
    </div>

    <div id="last-modified" class="last-modified" aria-label="Data da última atualização"></div>

    <script type="module" src="main.js"></script>
    <script>
        (function() {
            var el = document.getElementById('last-modified');
            if (el) el.textContent = 'Atualizado em 14/05/2026';
        })();
    </script>
</body>
</html>
